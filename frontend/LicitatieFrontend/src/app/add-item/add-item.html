<div class="add-item-container">
  <h2>Add Auction Item</h2>

  <div class="add-item-content">
    <!-- LEFT SIDE — Form -->
    <div class="add-item-form">
      <form (ngSubmit)="onSubmit()">
        <p>
          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="name" name="name" required />
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>Category</mat-label>
            <input matInput [(ngModel)]="category" name="category" required />
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>Starting Price (RON)</mat-label>
            <input matInput type="number" [(ngModel)]="startPrice" name="startPrice" required />
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>Location</mat-label>
            <input matInput [(ngModel)]="location" name="location" required />
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <textarea matInput [(ngModel)]="description" name="description"></textarea>
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>Start Date</mat-label>
            <input matInput type="date" [(ngModel)]="startDate" name="startDate" required />
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>End Date</mat-label>
            <input matInput type="date" [(ngModel)]="endDate" name="endDate" required />
          </mat-form-field>
        </p>

        <p>
          <mat-form-field appearance="outline">
            <mat-label>Image URL</mat-label>
            <input matInput [(ngModel)]="imageUrl" name="imageUrl" placeholder="https://..." />
          </mat-form-field>
        </p>

        <button mat-raised-button color="primary" type="submit">Add Item</button>

        @if (successMessage) {
          <p class="success-message">{{ successMessage }}</p>
        }
      </form>
    </div>

    <!-- RIGHT SIDE — Image Preview -->
    <div class="add-item-preview">
      @if (imageUrl) {
        <div class="preview-container">
          <h3>Preview</h3>
          <img [src]="imageUrl" alt="Item preview" class="image-preview" />
        </div>
      } @else {
        <div class="no-preview">
          <p>Image preview will appear here</p>
        </div>
      }
    </div>
  </div>
</div>
