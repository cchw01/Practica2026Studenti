<!-- NAV-UL TĂU -->
<nav class="navbar">
  <div class="navbar-inner">

    <!-- Logo -->
    <a routerLink="/home-page" class="brand" (click)="closeMenu()">
      <span class="brand-icon-wrap">
        <mat-icon class="brand-icon">gavel</mat-icon>
      </span>
      <span class="brand-name">
        <span class="brand-name-primary">Bid</span><span class="brand-name-accent">Sphere</span>
      </span>
    </a>

    <!-- Mobile menu toggle -->
    <button class="menu-toggle" type="button" [attr.aria-expanded]="menuOpen()"
      [attr.aria-label]="'NAV.TOGGLE_MENU' | translate" (click)="toggleMenu()">
      <mat-icon>{{ menuOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>

    <div class="nav-links" [class.open]="menuOpen()">

      <!-- Main links -->
      <div class="nav-links-main">
        <a routerLink="/home-page" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          <mat-icon>home</mat-icon>
          <span>{{ 'NAV.HOME' | translate }}</span>
        </a>
        <a routerLink="/auctions" routerLinkActive="active" (click)="closeMenu()">
          <mat-icon>gavel</mat-icon>
          <span>{{ 'NAV.AUCTIONS' | translate }}</span>
        </a>
        <a routerLink="/forum-page" routerLinkActive="active" (click)="closeMenu()">
          <mat-icon>forum</mat-icon>
          <span>{{ 'NAV.FORUM' | translate }}</span>
        </a>
        <a routerLink="/contact-page" routerLinkActive="active" (click)="closeMenu()">
          <mat-icon>mail</mat-icon>
          <span>{{ 'NAV.CONTACT' | translate }}</span>
        </a>
        <a routerLink="/help-page" routerLinkActive="active" (click)="closeMenu()">
          <mat-icon>help</mat-icon>
          <span>{{ 'NAV.HELP' | translate }}</span>
        </a>
        <a *ngIf="isAdmin()" routerLink="/admin" (click)="closeMenu()">
          <mat-icon>admin_panel_settings</mat-icon>
          <span>Admin</span>
        </a>
      </div>

      <!-- Actions -->
<div class="nav-links-actions">
  <a
    routerLink="/add-item"
    (click)="closeMenu()"
    class="btn-add-auction"
    aria-label="Add Auction"
    title="Add Auction">
    <mat-icon>add</mat-icon>
  </a>

  <!-- Language -->
  <div class="language-dropdown" (click)="$event.stopPropagation()">
  <button
    class="language-pill"
    type="button"
    (click)="languageMenuOpen = !languageMenuOpen">

    <mat-icon>language</mat-icon>

    <span>{{ currentLanguage().toUpperCase() }}</span>

    <mat-icon class="arrow">
      {{ languageMenuOpen ? 'expand_less' : 'expand_more' }}
    </mat-icon>
  </button>

  <div
    class="language-menu"
    *ngIf="languageMenuOpen">

    <button
      *ngFor="let lang of languages"
      type="button"
      (click)="changeLanguage(lang); languageMenuOpen=false">

      {{ lang.toUpperCase() }}

    </button>

  </div>
</div>

<!-- Login/Register dacă utilizatorul NU este logat -->
<div class="auth-pill" *ngIf="!isLoggedIn()">

  <a
    routerLink="/login-page"
    routerLinkActive="active"
    (click)="closeMenu()"
    class="auth-pill-link">
    Login
  </a>

  <span class="auth-pill-divider"></span>

  <a
    routerLink="/register-page"
    routerLinkActive="active"
    (click)="closeMenu()"
    class="auth-pill-link">
    Register
  </a>

</div>


<!-- Profil + notificări dacă utilizatorul ESTE logat -->
<div class="user-actions" *ngIf="isLoggedIn()">

  <a
    routerLink="/notifications"
    (click)="closeMenu()"
    class="btn-add-auction"
    title="Notifications">
    <mat-icon>notifications</mat-icon>
  </a>
<div class="profile-dropdown">

  <button
    class="btn-add-auction"
    type="button"
    (click)="profileMenuOpen = !profileMenuOpen"
    title="Profile">

    <mat-icon>account_circle</mat-icon>

  </button>


  <div 
    class="profile-menu"
    *ngIf="profileMenuOpen">

    <a
      routerLink="/profile-page"
      (click)="profileMenuOpen = false">

      <mat-icon>person</mat-icon>
      Profil

    </a>


    <button
      type="button"
      (click)="logout()">

      <mat-icon>logout</mat-icon>
      Log out

    </button>

  </div>

</div>

</div>
  
  
</div>
    </div>
  </div>
</nav>
<!-- Aici se încarcă paginile tale -->
<router-outlet></router-outlet>

<!-- Footer-ul paginii -->
<app-footer></app-footer>

<!-- Asistentul AI -->
<app-ai-widget></app-ai-widget>
