<nav class="navbar">
  <div class="navbar-inner">

    <a
      routerLink="/home-page"
      class="brand"
      (click)="closeMenu()"
    >
      <span class="brand-icon-wrap">
        <mat-icon class="brand-icon">gavel</mat-icon>
      </span>

      <span class="brand-name">
        <span class="brand-name-primary">Bid</span>
        <span class="brand-name-accent">Sphere</span>
      </span>
    </a>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      [attr.aria-label]="'NAV.TOGGLE_MENU' | translate"
      (click)="toggleMenu()"
    >
      <mat-icon>
        {{ menuOpen() ? 'close' : 'menu' }}
      </mat-icon>
    </button>

    <div
      class="nav-links"
      [class.open]="menuOpen()"
    >
      <div class="nav-links-main">

        <a
          routerLink="/home-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>home</mat-icon>
          <span>{{ 'NAV.HOME' | translate }}</span>
        </a>

        <a
          routerLink="/auctions"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>gavel</mat-icon>
          <span>{{ 'NAV.AUCTIONS' | translate }}</span>
        </a>

        <a
          routerLink="/forum-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>forum</mat-icon>
          <span>{{ 'NAV.FORUM' | translate }}</span>
        </a>

        <a
          routerLink="/contact-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>mail</mat-icon>
          <span>{{ 'NAV.CONTACT' | translate }}</span>
        </a>

        <a
          routerLink="/help-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>help</mat-icon>
          <span>{{ 'NAV.HELP' | translate }}</span>
        </a>

      </div>

      <div class="nav-links-actions">

<div class="language-switcher">
  <button
    type="button"
    mat-button
    class="language-dropdown-trigger"
    [matMenuTriggerFor]="languageMenu"
    [attr.aria-label]="'NAV.SELECT_LANGUAGE' | translate"
  >
    <mat-icon>language</mat-icon>

    <span>{{ currentLanguageLabel() }}</span>

    <mat-icon class="dropdown-arrow">
      expand_more
    </mat-icon>
  </button>

  <mat-menu #languageMenu="matMenu">

    <button
      mat-menu-item
      type="button"
      (click)="changeLanguage('en')"
    >
      <span class="language-code">EN</span>
      <span>English</span>

      @if (translate.currentLang() === 'en') {
        <mat-icon class="selected-language-icon">
          check
        </mat-icon>
      }
    </button>

    <button
      mat-menu-item
      type="button"
      (click)="changeLanguage('ro')"
    >
      <span class="language-code">RO</span>
      <span>Română</span>

      @if (translate.currentLang() === 'ro') {
        <mat-icon class="selected-language-icon">
          check
        </mat-icon>
      }
    </button>

    <button
      mat-menu-item
      type="button"
      (click)="changeLanguage('es')"
    >
      <span class="language-code">ES</span>
      <span>Español</span>

      @if (translate.currentLang() === 'es') {
        <mat-icon class="selected-language-icon">
          check
        </mat-icon>
      }
    </button>

  </mat-menu>
</div>

        <a
          routerLink="/login-page"
          routerLinkActive="active"
          (click)="closeMenu()"
          class="nav-link-login"
        >
          <mat-icon>login</mat-icon>
          <span>{{ 'NAV.LOGIN' | translate }}</span>
        </a>

        <a
          routerLink="/register-page"
          routerLinkActive="active"
          (click)="closeMenu()"
          class="nav-link-register"
        >
          <span>{{ 'NAV.REGISTER' | translate }}</span>
        </a>

      </div>
    </div>
  </div>
</nav>

<main class="page-content">
  <router-outlet></router-outlet>
</main>

<app-footer></app-footer>
