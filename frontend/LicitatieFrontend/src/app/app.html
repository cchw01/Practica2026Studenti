```html
<nav class="navbar">
  <div class="navbar-inner">

    <!-- Brand / logo -->
    <a
      routerLink="/home-page"
      class="brand"
      (click)="closeMenu()"
    >
      <span class="brand-icon-wrap">
        <mat-icon class="brand-icon">gavel</mat-icon>
      </span>

      <span class="brand-name">
        <span class="brand-name-primary">Bid</span>
        <span class="brand-name-accent">Sphere</span>
      </span>
    </a>

    <!-- Mobile menu button -->
    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      [attr.aria-label]="'NAV.TOGGLE_MENU' | translate"
      (click)="toggleMenu()"
    >
      <mat-icon>
        {{ menuOpen() ? 'close' : 'menu' }}
      </mat-icon>
    </button>

    <!-- Navigation menu -->
    <div
      class="nav-links"
      [class.open]="menuOpen()"
    >
      <!-- Main navigation links -->
      <div class="nav-links-main">

        <a
          routerLink="/home-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>home</mat-icon>
          <span>{{ 'NAV.HOME' | translate }}</span>
        </a>

        <a
          routerLink="/auctions"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>gavel</mat-icon>
          <span>{{ 'NAV.AUCTIONS' | translate }}</span>
        </a>

        <a
          routerLink="/forum-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>forum</mat-icon>
          <span>{{ 'NAV.FORUM' | translate }}</span>
        </a>

        <a
          routerLink="/contact-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>mail</mat-icon>
          <span>{{ 'NAV.CONTACT' | translate }}</span>
        </a>

        <a
          routerLink="/help-page"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon>help</mat-icon>
          <span>{{ 'NAV.HELP' | translate }}</span>
        </a>

      </div>

      <!-- Language and account actions -->
  <div class="nav-links-actions">

        <!-- Language switcher -->
        <div
          class="language-switcher"
          role="group"
          [attr.aria-label]="'NAV.SELECT_LANGUAGE' | translate"
        >
          <button
            type="button"
            class="language-button"
            [class.active-language]="translate.currentLang() === 'en'"
            (click)="changeLanguage('en')"
          >
            EN
          </button>

          <button
            type="button"
            class="language-button"
            [class.active-language]="translate.currentLang() === 'ro'"
            (click)="changeLanguage('ro')"
          >
            RO
          </button>

          <button
            type="button"
            class="language-button"
            [class.active-language]="translate.currentLang() === 'es'"
            (click)="changeLanguage('es')"
          >
            ES
          </button>
        </div>

        <!-- Login -->
        <a
          routerLink="/login-page"
          routerLinkActive="active"
          (click)="closeMenu()"
          class="nav-link-login"
        >
          <mat-icon>login</mat-icon>
          <span>{{ 'NAV.LOGIN' | translate }}</span>
        </a>

        <!-- Register -->
        <a
          routerLink="/register-page"
          routerLinkActive="active"
          (click)="closeMenu()"
          class="nav-link-register"
        >
          <span>{{ 'NAV.REGISTER' | translate }}</span>
        </a>

      </div>
    </div>
  </div>
</nav>
<router-outlet />

<app-footer></app-footer>
