<div class="review-container">
  <h2>Reviews</h2>

  <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

  <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()" class="review-form">
    <mat-form-field appearance="outline">
      <mat-label>Reviewer ID</mat-label>
      <input matInput type="number" formControlName="reviewerId" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Reviewed User ID</mat-label>
      <input matInput type="number" formControlName="reviewedUserId" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rating (0-5)</mat-label>
      <input matInput type="number" formControlName="rating" min="0" max="5" />
      <mat-error *ngIf="reviewForm.get('rating')?.hasError('min') || reviewForm.get('rating')?.hasError('max')">
        Rating-ul trebuie să fie între 0 și 5.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Comment</mat-label>
      <textarea matInput formControlName="comment" maxlength="1000"></textarea>
    </mat-form-field>

    <div class="form-actions">
      <button mat-raised-button color="primary" type="submit" [disabled]="reviewForm.invalid">
        {{ editingReviewId !== null ? 'Actualizează' : 'Adaugă' }}
      </button>
      <button mat-button type="button" *ngIf="editingReviewId !== null" (click)="cancelEdit()">
        Anulează
      </button>
    </div>
  </form>

  <div class="review-list">
    <div *ngFor="let review of reviews" class="review-item">
      <div class="review-header">
        <strong>{{ review.reviewerUserName }}</strong> → <strong>{{ review.reviewedUserUserName }}</strong>
        <span class="rating">⭐ {{ review.rating }}/5</span>
      </div>
      <p class="comment">{{ review.comment }}</p>
      <small>{{ review.reviewDate | date: 'medium' }}</small>

      <div class="review-actions">
        <button mat-icon-button (click)="editReview(review)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteReview(review.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
