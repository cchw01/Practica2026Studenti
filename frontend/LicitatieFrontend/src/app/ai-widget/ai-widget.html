<div class="chat-widget">

    <!-- Butonul Plutitor Principal -->
    <button class="chat-toggle" [ngClass]="{'chat-open': isChatOpen}" (click)="toggleChat()">
        <span *ngIf="!isChatOpen">💬 Chat AI</span>
        <span *ngIf="isChatOpen">✖</span>
    </button>

    <!-- Fereastra de Chat (Apare doar dacă isChatOpen este true) -->
    <div class="chat-box" *ngIf="isChatOpen">

        <div class="chat-header">
            <span class="status-dot"></span>
            Asistent AI
        </div>

        <!-- Zona unde apar mesajele -->
        <div class="chat-messages">
            <div *ngFor="let msg of messages; let i = index" class="message" [ngClass]="msg.isUser ? 'user' : 'ai'">
                {{ msg.text }}
            </div>
        </div>

        <!-- Zona de scriere text -->
        <div class="chat-input-area">
            <input type="text" placeholder="Scrie un mesaj..." [(ngModel)]="userInput" (keyup.enter)="sendMessage()">
            <button (click)="sendMessage()">Trimite</button>
        </div>
        
    </div>
</div>
