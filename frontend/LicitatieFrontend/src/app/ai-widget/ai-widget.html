<!-- Fereastra principală de chat (Apare doar când isChatOpen = true) -->
<div class="chat-container" *ngIf="isChatOpen">

    <!-- Partea de sus (Header) cu status verde -->
    <div class="chat-header">
        <div class="header-title">
            <span class="status-dot"></span>
            <h3>AI</h3>
        </div>
    </div>

    <!-- Zona unde apar mesajele -->
    <div class="chat-body">
        <div *ngFor="let msg of listaMesaje" class="message"
            [ngClass]="msg.expeditor === 'user' ? 'user-message' : 'ai-message'">
            {{ msg.text }}
        </div>

        <!-- Indicator de încărcare -->
        <div class="message ai-message" *ngIf="seIncarca">
            <em>...</em>
        </div>
    </div>

    <!-- Zona de scris -->
    <div class="chat-footer">
        <input [(ngModel)]="mesaj" (keydown.enter)="trimiteIntrebare()" placeholder="Ask something..."
            class="chat-input" />
        <button class="send-btn" (click)="trimiteIntrebare()">
            <!-- Iconița SVG pentru butonul de trimitere (avion de hârtie) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path
                    d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z" />
            </svg>
        </button>
    </div>
</div>

<!-- Butonul Plutitor (Apare mereu, dar își schimbă aspectul) -->
<button class="floating-btn" [ngClass]="{'close-mode': isChatOpen}" (click)="toggleChat()">

    <!-- Ce arată când chat-ul e ÎNCHIS -->
    <span *ngIf="!isChatOpen" class="btn-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path
                d="M2 1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h9.586a2 2 0 0 1 1.414.586l2 2V2a1 1 0 0 0-1-1H2zm12-1a2 2 0 0 1 2 2v12.793a.5.5 0 0 1-.854.353l-2.853-2.853a1 1 0 0 0-.707-.293H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12z" />
        </svg>
        Asistent AI
    </span>

    <!-- Ce arată când chat-ul e DESCHIS (X-ul roșu din imagine) -->
    <span *ngIf="isChatOpen" class="btn-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path
                d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
        </svg>
    </span>

</button>
