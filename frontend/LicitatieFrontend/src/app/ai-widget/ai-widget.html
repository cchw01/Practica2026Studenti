<!-- Butonul albastru plutitor (Apare doar când chatul e închis) -->
<button class="floating-btn" (click)="toggleChat()" *ngIf="!isChatOpen">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path
            d="M2 1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h9.586a2 2 0 0 1 1.414.586l2 2V2a1 1 0 0 0-1-1H2zm12-1a2 2 0 0 1 2 2v12.793a.5.5 0 0 1-.854.353l-2.853-2.853a1 1 0 0 0-.707-.293H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12z" />
    </svg>
    Asistent AI
</button>

<!-- Fereastra principală de chat (Apare doar când dai click pe buton) -->
<div class="chat-container" *ngIf="isChatOpen">
    <!-- Partea de sus (Header) cu buton de închidere -->
    <div class="chat-header">
        <h3>Asistent AI BidSphere</h3>
        <button class="close-btn" (click)="toggleChat()">✖</button>
    </div>

    <!-- Zona unde apar mesajele -->
    <div class="chat-body">
        <div class="raspuns-box" *ngIf="raspuns">
            <p><strong>AI:</strong> {{ raspuns }}</p>
        </div>
    </div>

    <!-- Zona de scris -->
    <div class="chat-footer">
        <input [(ngModel)]="mesaj" (keydown.enter)="trimiteIntrebare()" placeholder="Scrie un mesaj..." />
        <button class="send-btn" (click)="trimiteIntrebare()">Trimite</button>
    </div>
</div>
