<div class="split-layout">
  <div class="image-section"></div>

  <div class="form-section">
    <div class="register-container">

      <h2>Forgot password</h2>

      <p class="description">
        Enter your email address and we will send you a password reset link.
      </p>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="login-error">
        {{ errorMessage }}
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="sendEmail()">

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>

          <input
            matInput
            type="email"
            formControlName="email">

          <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>

          <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">
            Invalid email
          </mat-error>

        </mat-form-field>

        <button
          mat-raised-button
          class="submit-btn"
          type="submit"
          [disabled]="forgotForm.invalid">

          Send reset link

        </button>

      </form>

      <div class="login-link">

        <button
          class="btn-register"
          routerLink="/login-page">

          Back to login

        </button>

      </div>

    </div>
  </div>
</div>
