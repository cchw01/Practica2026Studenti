<button mat-icon-button [matMenuTriggerFor]="menu" (click)="open()">
  <mat-icon
    matBadge="•"
    matBadgeColor="warn"
    matBadgeSize="small"
    [matBadgeHidden]="!hasUnread()">
    notifications
  </mat-icon>
</button>
<mat-menu #menu="matMenu">
  <button mat-menu-item *ngFor="let n of notifications()" (click)="read(n)" [class.unread]="!n.isRead">
    {{ n.message }}
  </button>
  <div *ngIf="notifications().length === 0" class="empty">No notifications yet</div>
</mat-menu>
