<div class="notification-wrapper">
  <button mat-icon-button class="notification-button" [matMenuTriggerFor]="notificationMenu" (menuOpened)="open()"
    aria-label="Open notifications">
    <mat-icon>notifications</mat-icon>

    <span *ngIf="showUnreadIndicator()" class="notification-indicator"></span>

    <span *ngIf="showUnreadIndicator()" class="notification-count">
      {{ displayUnreadCount() }}
    </span>
  </button>
</div>

<mat-menu #notificationMenu="matMenu" class="notification-menu" xPosition="before" [overlapTrigger]="false">
  <div class="notification-panel" (click)="$event.stopPropagation()">
    <div class="notification-header">
      <h2>Notifications</h2>

      <div class="do-not-disturb">
        <span>Do not disturb</span>

        <mat-slide-toggle [checked]="doNotDisturb()" (change)="toggleDoNotDisturb($event.checked)"
          aria-label="Do not disturb">
        </mat-slide-toggle>
      </div>
    </div>

    <div *ngIf="isLoading()" class="notification-state">
      Loading notifications...
    </div>

    <div *ngIf="!isLoading() && notifications().length === 0" class="notification-state">
      {{ 'NOTIFICATIONS.FALSE' | translate }}
    </div>

    <div *ngIf="!isLoading() && notifications().length > 0" class="notification-list">
      <article *ngFor="let notification of notifications(); trackBy: trackByNotificationId" class="notification-item"
        [class.unread]="!notification.isRead" (click)="read(notification)">
        <span class="status-dot" [class.status-dot-read]="notification.isRead" aria-hidden="true"></span>

        <div class="notification-content">
          <p class="notification-message">
            {{ notification.message }}
          </p>

          <time class="notification-time" [attr.datetime]="notification.createdAt">
            {{ getRelativeTime(notification.createdAt) }}
          </time>
        </div>

        <button mat-icon-button class="notification-actions-button" [matMenuTriggerFor]="actionsMenu"
          [matMenuTriggerData]="{ notification: notification }" (click)="$event.stopPropagation()"
          aria-label="Notification actions">
          <mat-icon>more_horiz</mat-icon>
        </button>
      </article>
    </div>

    <div *ngIf="notifications().length > 0" class="notification-footer">
      <button type="button" class="mark-all-button" [disabled]="unreadCount() === 0 || isMarkingAllRead()"
        (click)="markAllAsRead()">
        {{ isMarkingAllRead() ? 'Marking as read...' : 'Mark all as read' }}
      </button>
    </div>
  </div>
</mat-menu>

<mat-menu #actionsMenu="matMenu">
  <ng-template matMenuContent let-notification="notification">
    <button mat-menu-item (click)="hideNotification(notification); $event.stopPropagation()">
      <mat-icon>delete_outline</mat-icon>
      <span>Delete notification</span>
    </button>
  </ng-template>
</mat-menu>
